name: Study feedback
description: Suggest a correction or comment on an existing study
title: "Study feedback: "
labels:
  - study-feedback
body:
  - type: markdown
    attributes:
      value: |
        Quick feedback on a published study — typos, terminology, citations, or clarity.

        For **new studies** or full rewrites, use [My Submissions](https://analyticmadhyasthdarshan.org/Studies/submit.html) instead.

  - type: dropdown
    id: study
    attributes:
      label: Which study?
      description: Choose the study your comment is about.
      options:
        - Aesthetics
        - Category Theory Explained
        - Coexistence Company — Concrete Organizational Structure
        - Ethics and Morals in Human Beings
        - How to Form Self-Sustaining Organizations
        - How Undivided Society Is Established
        - Human Behavior and Society
        - Knowledge Knower and Known
        - Nature of Time
        - The Coexistence Template
        - The Ontology of Coexistence
        - Why Humans Are Not Just Material
        - General — catalog or website
    validations:
      required: true

  - type: dropdown
    id: feedback_type
    attributes:
      label: What kind of feedback?
      options:
        - Typo or formatting
        - Terminology / translation
        - Factual or citation
        - Clarity / readability
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Your comment
      description: Optional — mention a section (e.g. §2.3) or paste a short quote so we can find the passage.
      placeholder: |
        In §1.7, *sanskar* could use a brief gloss on first use...
    validations:
      required: true
