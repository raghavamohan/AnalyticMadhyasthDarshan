name: Study feedback
description: Suggest a correction, terminology note, or factual feedback on an existing study
title: "Study feedback: "
labels:
  - study-feedback
body:
  - type: markdown
    attributes:
      value: |
        Use this for **small feedback** on an existing study — typos, unclear terminology, citation fixes, or factual questions.

        For **new studies** or full rewrites, use the [Web Submission Portal](https://analyticmadhyasthdarshan.org/Studies/submit.html) or the [study proposal](https://github.com/raghavamohan/AnalyticMadhyasthDarshan/issues/new?template=study-proposal.yml) template instead.

        No approval gate; maintainers triage into small pull requests when appropriate.

  - type: input
    id: study_slug
    attributes:
      label: Study slug
      description: Folder name under Studies/ (e.g. The-Ontology-of-Coexistence). Pre-filled when opened from a study page.
      placeholder: The-Ontology-of-Coexistence
    validations:
      required: true

  - type: dropdown
    id: feedback_type
    attributes:
      label: Feedback type
      options:
        - Typo or formatting
        - Terminology / translation
        - Factual or citation
        - Clarity / readability
        - Other
    validations:
      required: true

  - type: input
    id: section_reference
    attributes:
      label: Section or quote (optional)
      description: Section heading, paragraph excerpt, or PDF page to locate the issue.
      placeholder: "§2.3 or paste a short quote"

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What should change, and why? For terminology, suggest the preferred English gloss if you have one.
      placeholder: |
        The term *sanskar* in §1.7 could use a brief gloss on first use...
    validations:
      required: true
