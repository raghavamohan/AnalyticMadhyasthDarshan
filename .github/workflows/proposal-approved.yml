name: Proposal approved

on:
  issues:
    types:
      - labeled

permissions:
  contents: write
  issues: write

jobs:
  comment:
    if: github.event.label.name == 'proposal-approved'
    runs-on: ubuntu-latest
    steps:
      - name: Ensure study-proposal label remains
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = context.payload.issue.number;
            const labels = (context.payload.issue.labels || []).map((l) => l.name);
            const toAdd = ['study-proposal', 'proposal-approved'].filter((name) => !labels.includes(name));
            if (toAdd.length) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                labels: toAdd,
              });
            }

      - name: Post approval instructions
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const repo = context.repo.owner + '/' + context.repo.repo;
            const issueNumber = issue.number;
            const portalBase = 'https://analyticmadhyasthdarshan.org/Studies/submit.html';
            const portalHubUrl = portalBase;
            const portalSubmitUrl = portalBase + '?tab=submit&proposal=' + issueNumber;
            const prUrl =
              `https://github.com/${repo}/compare/master...master?` +
              `quick_pull=1&labels=new-study&` +
              `title=Add+study&` +
              `body=${encodeURIComponent(
                '## New study\n\n' +
                `Proposal issue: #${issueNumber}\n` +
                'Slug: <!-- e.g. My-New-Study -->\n' +
                'Tags: MVD, SB, JV\n\n' +
                '### Summary\n\n' +
                '<!-- Briefly describe the study question and primary texts -->\n\n' +
                '### Checklist\n\n' +
                '- [ ] Linked proposal issue is labeled `proposal-approved`\n' +
                '- [ ] `Studies/<Slug>/<Slug>.md` follows format in Studies/README.md\n' +
                '- [ ] References link to `References/` where permitted; no restricted uploads\n' +
                '- [ ] Applied label **`new-study`** to this pull request\n'
              )}`;

            const body = [
              '### Proposal approved',
              '',
              'Thank you — this study proposal is approved. A pre-catalog study directory will be created on the default branch (proposal stub markdown, HTML, and PDF). The study is **not** listed on the public index until your first draft pull request is merged.',
              '',
              '#### Recommended: Web Submission Portal',
              '',
              '1. Open [**My Submissions**](' + portalHubUrl + ') and sign in with GitHub.',
              '2. Find proposal **#' + issueNumber + '** in your list — when the row shows **Ready for draft**, click **Submit draft**.',
              '3. Or open the [**submit form**](' + portalSubmitUrl + ') directly (proposal issue # pre-filled).',
              '4. The study slug is fixed from the approved proposal — paste your full markdown draft.',
              '5. Submit the form — a pull request will be opened automatically. Track CI on the same page.',
              '',
              'CI will verify this issue is approved, register the study in the catalog as **Draft** on merge, and regenerate the PDF on your PR branch.',
              '',
              '<details>',
              '<summary><strong>Advanced: submit via GitHub (fork and pull request)</strong></summary>',
              '',
              '1. **Fork** the repository and create a branch.',
              '2. Add `Studies/<Slug>/<Slug>.md` following the format in [Studies/README.md](https://github.com/' + repo + '/blob/master/Studies/README.md).',
              '3. Open a pull request with the [**new-study** template](https://github.com/' + repo + '/compare/master...master?expand=1&template=new-study.md).',
              '4. Set `Proposal issue: #' + issueNumber + '` in the PR body.',
              '5. Apply the **`new-study`** label to the PR.',
              '',
              '[Open a new-study pull request](' + prUrl + ')',
              '',
              '</details>',
              '',
              'To **update** an existing study later, use **Update a study** on My Submissions. To **release** or **revert to draft**, use **Change release status** or the row actions on a merged study.',
              '',
              'Full guide: [CONTRIBUTING.md](https://github.com/' + repo + '/blob/master/CONTRIBUTING.md).'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body
            });

  bootstrap:
    if: github.event.label.name == 'proposal-approved'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Node dependencies
        working-directory: Scripts
        run: npm ci

      - name: Install Puppeteer Chrome
        working-directory: Scripts
        run: npx puppeteer browsers install chrome

      - name: Bootstrap pre-catalog study directory
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python Scripts/_bootstrap_proposal_study.py --issue ${{ github.event.issue.number }} --force

      - name: Commit bootstrap artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Studies/
          if git diff --staged --quiet; then
            echo "No bootstrap file changes to commit."
          else
            git commit -m "ci: bootstrap pre-catalog proposal study (issue #${{ github.event.issue.number }}) [skip ci]"
            git push
          fi
