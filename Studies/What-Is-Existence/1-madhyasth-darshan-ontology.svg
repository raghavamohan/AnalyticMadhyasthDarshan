<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="780" height="600" viewBox="0 0 780 600" role="img">
<title>The structure of existence in Madhyasth Darshan</title>
<desc>Existence is coexistence (saha-astitva): formless Omnipresence (satta) is the all-pervasive ground in which countless real units (ikai) are saturated (samprikt), each carrying roop, gun, svabhav, and dharma, and standing in sambandh with other units. Two distinct progressions: Development (to T1) runs through the biochemical complex, not a single atom alone; Awakening (T2-T3) matures constitutionally complete jeevan. Orders and planes are mapped in detail in the companion orders-planes diagram.</desc>
<style>
  .th       { font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 600; font-size: 15px; fill: #1A1A18; }
  .ts       { font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 400; font-size: 12px; fill: #56554F; }
  .txs      { font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 400; font-size: 10px; fill: #6B6A63; }
  .txs-dim  { font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 400; font-size: 9px;  fill: #8A8980; }
  .unit-title { font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 600; font-size: 11px; fill: #1A1A18; }
  .unit-tag   { font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 500; font-size: 9px;  fill: #0F6E56; }
  .unit-line  { font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 400; font-size: 9px;  fill: #6B6A63; }
  .band     { font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 600; font-size: 10px; }
  .stagenum { font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 700; font-size: 11px; fill: #FCFBF8; }
  .frame { fill: #FCFBF8; stroke: #D8D6CD; stroke-width: 1.5; }
  .satta-field { fill: #EDEBE3; stroke: #C9C6BB; stroke-width: 1; }
  .c-teal   rect { fill: #E3F0EC; stroke: #0F6E56; }
  .c-blue   rect { fill: #E7F0F9; stroke: #185FA5; }
  .c-purple rect { fill: #ECE7F6; stroke: #5B3FA0; }
  .c-gold   rect { fill: #F5F0E3; stroke: #8A6D1A; }
  .c-sage   rect { fill: #E8F0E4; stroke: #4A7A3A; }
  .arr-teal   { stroke: #0F6E56; stroke-width: 2;   fill: none; }
  .arr-purple { stroke: #5B3FA0; stroke-width: 1.5; fill: none; }
  .arr-coral  { stroke: #993C1D; stroke-width: 1.5; fill: none; }
  .sat-link   { stroke: #B7B5AC; stroke-width: 1;   fill: none; stroke-dasharray: 4 3; }
  .bracket    { stroke: #56554F; stroke-width: 1.25; fill: none; }
</style>
<defs>
  <marker id="ar-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#0F6E56" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="ar-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#5B3FA0" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="ar-coral" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#993C1D" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
<rect class="frame" x="8" y="8" width="764" height="584" rx="24"/>

<!-- PART A: coexistence -->
<text class="th" x="40" y="44">Coexistence (saha-astitva) — the two inseparable aspects</text>
<rect class="satta-field" x="40" y="56" width="700" height="252" rx="18"/>
<text class="th"  x="60" y="80">Omnipresence (satta) — state-complete (sthitipurn)</text>
<text class="txs" x="60" y="96">Formless, actionless (kriya-shunya), immeasurable, all-pervasive. Energises, regulates, conserves all units. Not countable.</text>
<text class="txs-dim" x="60" y="110">The tinted field IS satta: it surrounds, submerges and soaks every unit. Satta does not act; it is the ground through which units are active.</text>
<text class="ts"  x="390" y="140" text-anchor="middle">Nature (prakriti) — state-dynamic (sthitishil): countless units (ikai), bounded and countable, not finite in number</text>
<g class="c-teal">
  <rect x="120" y="158" width="96" height="60" rx="10" stroke-width="0.75"/>
  <text class="unit-title" x="168" y="184" text-anchor="middle">Unit</text>
  <text class="unit-tag"   x="168" y="200" text-anchor="middle">jada (insentient)</text>
</g>
<g class="c-teal">
  <rect x="292" y="158" width="96" height="60" rx="10" stroke-width="0.75"/>
  <text class="unit-title" x="340" y="182" text-anchor="middle">Unit</text>
  <text class="unit-line"  x="340" y="198" text-anchor="middle">(ikai) — any</text>
</g>
<g class="c-teal">
  <rect x="464" y="158" width="96" height="60" rx="10" stroke-width="0.75"/>
  <text class="unit-title" x="512" y="184" text-anchor="middle">Unit</text>
  <text class="unit-tag"   x="512" y="200" text-anchor="middle">jeevan (sentient)</text>
</g>
<text class="th"  x="624" y="188" text-anchor="middle" fill="#6B6A63">. . .</text>
<text class="txs" x="624" y="204" text-anchor="middle">countless more</text>
<line x1="219" y1="184" x2="289" y2="184" class="arr-teal" marker-end="url(#ar-teal)"/>
<line x1="289" y1="192" x2="219" y2="192" class="arr-teal" marker-end="url(#ar-teal)"/>
<text class="txs" x="254" y="152" text-anchor="middle">sambandh</text>
<line x1="391" y1="184" x2="461" y2="184" class="arr-teal" marker-end="url(#ar-teal)"/>
<line x1="461" y1="192" x2="391" y2="192" class="arr-teal" marker-end="url(#ar-teal)"/>
<text class="txs" x="426" y="152" text-anchor="middle">sambandh</text>
<line x1="340" y1="218" x2="340" y2="240" class="sat-link"/>
<text class="txs" x="340" y="256" text-anchor="middle">saturation (samprikt): unit and ground — the more fundamental relation</text>
<text class="ts" x="390" y="282" text-anchor="middle">Each unit carries an inseparable signature — <tspan font-style="italic">roop, gun, svabhav, dharma</tspan></text>
<text class="txs" x="390" y="299" text-anchor="middle">essentiality (maulikta) = participation in orderliness (vyavastha) through value (mulya) in mutuality</text>

<!-- PART B: orders / planes summary -->
<text class="th"  x="40" y="330">Four orders, four planes, three transitions</text>
<text class="txs" x="40" y="348">An order names what a unit is (cumulative dharma); a plane names where development has reached.</text>
<text class="txs" x="40" y="364">Material and bio span the physicochemical plane; animal maps to the delusional plane; the knowledge order spans deluded, deific, and divine plane-states.</text>
<text class="txs-dim" x="40" y="382">Detailed orders–planes map with T1–T3 transitions: §1.8.</text>

<!-- PART C: two progressions -->
<text class="th" x="40" y="418">Two progressions — never to be confused</text>
<g class="c-purple"><rect x="40" y="430" width="345" height="150" rx="12" stroke-width="0.75"/></g>
<text class="th"  x="60" y="454" fill="#5B3FA0">Development Progression</text>
<text class="txs" x="60" y="472">Matter completing itself INTO a self.</text>
<text class="ts"  x="60" y="490">Runs through the entire physicochemical /</text>
<text class="ts"  x="60" y="506">biochemical complex — not in one atom alone.</text>
<text class="ts"  x="60" y="522">Atoms integrate within that assembly until</text>
<text class="ts"  x="60" y="538">T1 (gathanpurnata): sentient, immortal jeevan.</text>
<text class="txs" x="60" y="556">Once crossed, it does not reverse.</text>
<g class="c-coral"><rect x="403" y="430" width="337" height="150" rx="12" fill="#F9E9E2" stroke="#993C1D" stroke-width="0.75"/></g>
<text class="th"  x="423" y="454" fill="#993C1D">Awakening Progression</text>
<text class="txs" x="423" y="472">A self that already exists maturing.</text>
<text class="ts"  x="423" y="494">Inside a constitutionally complete jeevan,</text>
<text class="ts"  x="423" y="510">higher perspectives come online: T2 activity</text>
<text class="ts"  x="423" y="526">and T3 conduct completeness.</text>
<text class="txs" x="423" y="548">Happens only in humans, through study</text>
<text class="txs" x="423" y="562">and conduct. It can move either way.</text>
<line x1="385" y1="505" x2="402" y2="505" class="arr-coral" marker-end="url(#ar-coral)"/>
</svg>
