<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="740" height="820" viewBox="0 0 740 820" role="img">
<title>The structure of existence in Madhyasth Darshan</title>
<desc>Existence is coexistence: formless Omnipresence (satta) as ground; real units with inseparable form, properties, essential nature, and dharma; sambandh between units; essentiality as participation in orderliness; four planes (physicochemical, delusional, deific, divine) with svabhav and dharma in brackets per unit type; three completeness transitions; Development and Awakening Progressions.</desc>

<!-- ============================================================
     EDIT COLORS, FONTS AND TEXT SIZES HERE
     Each tradition diagram shares this same style block so the
     three stay visually consistent. Change a value once and it
     applies everywhere it is used below.
     ============================================================ -->
<style>
  /* fonts */
  .th { font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 600; font-size: 15px; fill: #1A1A18; }
  .ts { font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 400; font-size: 12px; fill: #56554F; }
  .txs { font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 400; font-size: 10px; fill: #6B6A63; }

  /* diagram title (top) and caption (bottom) */
  .title   { font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 700; font-size: 20px; fill: #1A1A18; }
  .caption { font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 400; font-size: 12px; font-style: italic; fill: #6B6A63; }

  /* outer background frame */
  .frame { fill: #FCFBF8; stroke: #D8D6CD; stroke-width: 1.5; }

  /* box fills + strokes, grouped by colour role */
  .c-gray   rect { fill: #F2F1EC; stroke: #B7B5AC; }
  .c-teal   rect { fill: #E3F0EC; stroke: #0F6E56; }
  .c-blue   rect { fill: #E7F0F9; stroke: #185FA5; }
  .c-purple rect { fill: #ECE7F6; stroke: #5B3FA0; }
  .c-coral  rect { fill: #F9E9E2; stroke: #993C1D; }
  .c-gold   rect { fill: #F5F0E3; stroke: #8A6D1A; }
  .c-sage   rect { fill: #E8F0E4; stroke: #4A7A3A; }

  /* connector lines */
  .arr { stroke: #56554F; stroke-width: 1.5; fill: none; }
  .arr-teal { stroke: #0F6E56; stroke-width: 1.5; fill: none; }
  .arr-purple { stroke: #5B3FA0; stroke-width: 1.5; fill: none; }
</style>

<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- ===== OUTER BACKGROUND FRAME ===== -->
<rect class="frame" x="8" y="8" width="724" height="804" rx="24"/>

<!-- ===== GROUND: Omnipresence (satta) ===== -->
<g class="c-gray">
  <rect x="40" y="40" width="660" height="210" rx="20" stroke-width="0.5"/>
  <text class="th" x="60" y="66">Omnipresence (satta) — the pervasive ground</text>
  <text class="ts" x="60" y="84">Formless, actionless, non-transforming. Energises and conserves all units.</text>
</g>

<!-- ===== UNITS saturated in the ground ===== -->
<g class="c-teal">
  <rect x="70" y="105" width="150" height="130" rx="12" stroke-width="0.5"/>
  <text class="th" x="145" y="132" text-anchor="middle">Unit</text>
  <text class="txs" x="145" y="152" text-anchor="middle">form · properties</text>
  <text class="txs" x="145" y="166" text-anchor="middle">svabhav · dharma</text>
</g>
<g class="c-teal">
  <rect x="265" y="105" width="150" height="130" rx="12" stroke-width="0.5"/>
  <text class="th" x="340" y="132" text-anchor="middle">Unit</text>
  <text class="txs" x="340" y="152" text-anchor="middle">form · properties</text>
  <text class="txs" x="340" y="166" text-anchor="middle">svabhav · dharma</text>
</g>
<g class="c-teal">
  <rect x="460" y="105" width="150" height="130" rx="12" stroke-width="0.5"/>
  <text class="th" x="535" y="132" text-anchor="middle">Unit</text>
  <text class="txs" x="535" y="152" text-anchor="middle">form · properties</text>
  <text class="txs" x="535" y="166" text-anchor="middle">svabhav · dharma</text>
</g>

<!-- horizontal relation between units: sambandh -->
<text class="ts" x="242" y="200" text-anchor="middle">sambandh</text>
<line x1="222" y1="207" x2="263" y2="207" class="arr-teal" marker-end="url(#arrow)"/>
<line x1="263" y1="217" x2="222" y2="217" class="arr-teal" marker-end="url(#arrow)"/>
<text class="ts" x="437" y="200" text-anchor="middle">sambandh</text>
<line x1="417" y1="207" x2="458" y2="207" class="arr-teal" marker-end="url(#arrow)"/>
<line x1="458" y1="217" x2="417" y2="217" class="arr-teal" marker-end="url(#arrow)"/>

<foreignObject x="50" y="232" width="640" height="28">
  <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:'Helvetica Neue',Arial,sans-serif;font-size:10px;font-weight:400;color:#6B6A63;line-height:1.35;margin:0;text-align:center;">essentiality (maulikta) = participation in orderliness through value in mutuality</div>
</foreignObject>

<!-- ===== FOUR PLANES ===== -->
<text class="th" x="40" y="278">Four planes and three completeness transitions</text>
<text class="txs" x="40" y="292">Bracketed: svabhav · dharma</text>

<!-- Physicochemical plane -->
<g class="c-blue">
  <rect x="40" y="302" width="660" height="68" rx="8" stroke-width="0.5"/>
  <text class="th" x="56" y="322">Physicochemical plane</text>
  <text class="ts" x="56" y="340">Material order</text>
  <text class="txs" x="148" y="340">(integration–disintegration · existence)</text>
  <text class="ts" x="56" y="358">Bio / pranic order</text>
  <text class="txs" x="168" y="358">(vitalising–devitalising · growth)</text>
</g>

<!-- T1 arrow -->
<line x1="370" y1="370" x2="370" y2="388" class="arr-purple" marker-end="url(#arrow)"/>
<text class="txs" x="378" y="382">T1 gathanpurnata (irreversible)</text>

<!-- Delusional plane -->
<g class="c-purple">
  <rect x="40" y="392" width="660" height="68" rx="8" stroke-width="0.5"/>
  <text class="th" x="56" y="412">Delusional plane</text>
  <text class="ts" x="56" y="430">Animal order</text>
  <text class="txs" x="148" y="430">(cruel–uncruel · hope to live)</text>
  <text class="ts" x="56" y="448">Deluded humans</text>
  <text class="txs" x="168" y="448">(servility, perfidy, cruelty · attachment)</text>
</g>

<!-- T2 arrow -->
<line x1="370" y1="460" x2="370" y2="478" class="arr-purple" marker-end="url(#arrow)"/>
<text class="txs" x="378" y="472">T2 kriyapurnata</text>

<!-- Deific plane -->
<g class="c-gold">
  <rect x="40" y="482" width="660" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="56" y="502">Deific plane — awakened humans</text>
  <foreignObject x="52" y="508" width="636" height="26">
    <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:'Helvetica Neue',Arial,sans-serif;font-size:10px;font-weight:400;color:#6B6A63;line-height:1.35;margin:0;">(fortitude, courage, generosity, kindness, grace, compassion · happiness)</div>
  </foreignObject>
</g>

<!-- T3 arrow -->
<line x1="370" y1="538" x2="370" y2="556" class="arr-purple" marker-end="url(#arrow)"/>
<text class="txs" x="378" y="550">T3 vyavaharpurnata</text>

<!-- Divine plane -->
<g class="c-sage">
  <rect x="40" y="560" width="660" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="56" y="580">Divine (complete) plane — awakened with evidence</text>
  <foreignObject x="52" y="586" width="636" height="26">
    <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:'Helvetica Neue',Arial,sans-serif;font-size:10px;font-weight:400;color:#6B6A63;line-height:1.35;margin:0;">(same svabhav · happiness — conduct evidenced as pramanikta)</div>
  </foreignObject>
</g>

<!-- footnote below planes -->
<foreignObject x="40" y="624" width="660" height="44">
  <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:'Helvetica Neue',Arial,sans-serif;font-size:12px;font-weight:400;color:#56554F;line-height:1.35;margin:0;text-align:justify;text-justify:inter-word;">Orders name what a unit is; planes name where development has reached. T1 is irreversible at the atom; T2–T3 are awakening milestones in humans.</div>
</foreignObject>

<!-- ===== TWO PROGRESSIONS ===== -->
<text class="th" x="40" y="682">Two progressions</text>
<g class="c-purple">
  <rect x="40" y="694" width="320" height="96" rx="12" stroke-width="0.5"/>
  <text class="th" x="60" y="718">Development Progression</text>
  <foreignObject x="52" y="726" width="296" height="58">
    <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:'Helvetica Neue',Arial,sans-serif;font-size:12px;font-weight:400;color:#56554F;line-height:1.35;margin:0;text-align:justify;text-justify:inter-word;">Through the physicochemical plane to T1: the atom reaches constitutional completeness and becomes sentient (jeevan).</div>
  </foreignObject>
</g>
<g class="c-coral">
  <rect x="380" y="694" width="320" height="96" rx="12" stroke-width="0.5"/>
  <text class="th" x="400" y="718">Awakening Progression</text>
  <foreignObject x="392" y="726" width="296" height="58">
    <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:'Helvetica Neue',Arial,sans-serif;font-size:12px;font-weight:400;color:#56554F;line-height:1.35;margin:0;text-align:justify;text-justify:inter-word;">Inside constitutionally complete jeevan: T2 activity and T3 conduct completeness through higher perspectives.</div>
  </foreignObject>
</g>
<line x1="360" y1="742" x2="379" y2="742" class="arr" stroke="#993C1D" marker-end="url(#arrow)"/>

</svg>
