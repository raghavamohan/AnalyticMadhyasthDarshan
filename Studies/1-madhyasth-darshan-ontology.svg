<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="740" height="616" viewBox="0 0 740 616" role="img">
<title>The structure of existence in Madhyasth Darshan</title>
<desc>Existence is coexistence: formless Omnipresence (satta) as the pervasive ground, with countless real units saturated in it. Units relate along two axes — saturation (vertical, to the ground) and sambandh (horizontal, between units). Nature develops through four stable orders. Two distinct progressions operate: Development Progression within an atom toward becoming a sentient self, and Awakening Progression within that self toward completeness.</desc>

<!-- ============================================================
     EDIT COLORS, FONTS AND TEXT SIZES HERE
     Each tradition diagram shares this same style block so the
     three stay visually consistent. Change a value once and it
     applies everywhere it is used below.
     ============================================================ -->
<style>
  /* fonts */
  .th { font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 600; font-size: 15px; fill: #1A1A18; }
  .ts { font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 400; font-size: 12px; fill: #56554F; }

  /* diagram title (top) and caption (bottom) */
  .title   { font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 700; font-size: 20px; fill: #1A1A18; }
  .caption { font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 400; font-size: 12px; font-style: italic; fill: #6B6A63; }

  /* outer background frame */
  .frame { fill: #FCFBF8; stroke: #D8D6CD; stroke-width: 1.5; }

  /* box fills + strokes, grouped by colour role */
  .c-gray   rect { fill: #F2F1EC; stroke: #B7B5AC; }
  .c-teal   rect { fill: #E3F0EC; stroke: #0F6E56; }
  .c-blue   rect { fill: #E7F0F9; stroke: #185FA5; }
  .c-purple rect { fill: #ECE7F6; stroke: #5B3FA0; }
  .c-coral  rect { fill: #F9E9E2; stroke: #993C1D; }

  /* connector lines */
  .arr { stroke: #56554F; stroke-width: 1.5; fill: none; }
</style>

<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- ===== OUTER BACKGROUND FRAME ===== -->
<rect class="frame" x="8" y="8" width="724" height="600" rx="24"/>

<!-- ===== DIAGRAM CONTENT ===== -->
<g transform="translate(-10,0)">
<!-- ===== GROUND: Omnipresence (satta) ===== -->
<g class="c-gray">
  <rect x="40" y="40" width="600" height="250" rx="20" stroke-width="0.5"/>
  <text class="th" x="60" y="66">Omnipresence (satta) — the pervasive ground</text>
  <text class="ts" x="60" y="84">Formless, actionless, non-transforming. Energises and conserves all units.</text>
</g>

<!-- ===== UNITS saturated in the ground ===== -->
<g class="c-teal">
  <rect x="70" y="110" width="150" height="150" rx="12" stroke-width="0.5"/>
  <text class="th" x="145" y="150" text-anchor="middle">Unit</text>
  <text class="ts" x="145" y="178" text-anchor="middle">Real, bounded, countable</text>
</g>
<g class="c-teal">
  <rect x="265" y="110" width="150" height="150" rx="12" stroke-width="0.5"/>
  <text class="th" x="340" y="150" text-anchor="middle">Unit</text>
  <text class="ts" x="340" y="178" text-anchor="middle">Real, bounded, countable</text>
</g>
<g class="c-teal">
  <rect x="460" y="110" width="150" height="150" rx="12" stroke-width="0.5"/>
  <text class="th" x="535" y="150" text-anchor="middle">Unit</text>
  <text class="ts" x="535" y="178" text-anchor="middle">Real, bounded, countable</text>
</g>

<!-- horizontal relation between units: sambandh -->
<text class="ts" x="242" y="218" text-anchor="middle">sambandh</text>
<line x1="222" y1="225" x2="263" y2="225" class="arr" stroke="#0F6E56" marker-end="url(#arrow)"/>
<line x1="263" y1="235" x2="222" y2="235" class="arr" stroke="#0F6E56" marker-end="url(#arrow)"/>
<text class="ts" x="437" y="218" text-anchor="middle">sambandh</text>
<line x1="417" y1="225" x2="458" y2="225" class="arr" stroke="#0F6E56" marker-end="url(#arrow)"/>
<line x1="458" y1="235" x2="417" y2="235" class="arr" stroke="#0F6E56" marker-end="url(#arrow)"/>

<!-- vertical relation to ground: saturation -->
<text class="ts" x="600" y="284" text-anchor="end">saturation: every unit soaked in satta, is active and directed towards orderliness (completeness)</text>

<!-- ===== FOUR ORDERS ===== -->
<text class="th" x="40" y="330">Nature develops through four stable orders</text>
<g class="c-blue">
  <rect x="40" y="345" width="142" height="60" rx="8" stroke-width="0.5"/>
  <text class="th" x="111" y="368" text-anchor="middle" dominant-baseline="central">Material</text>
  <text class="ts" x="111" y="386" text-anchor="middle" dominant-baseline="central">existence</text>
</g>
<g class="c-blue">
  <rect x="192" y="345" width="142" height="60" rx="8" stroke-width="0.5"/>
  <text class="th" x="263" y="368" text-anchor="middle" dominant-baseline="central">Bio / pranic</text>
  <text class="ts" x="263" y="386" text-anchor="middle" dominant-baseline="central">+ growth</text>
</g>
<g class="c-blue">
  <rect x="344" y="345" width="142" height="60" rx="8" stroke-width="0.5"/>
  <text class="th" x="415" y="368" text-anchor="middle" dominant-baseline="central">Animal</text>
  <text class="ts" x="415" y="386" text-anchor="middle" dominant-baseline="central">+ hope to live</text>
</g>
<g class="c-blue">
  <rect x="496" y="345" width="144" height="60" rx="8" stroke-width="0.5"/>
  <text class="th" x="568" y="368" text-anchor="middle" dominant-baseline="central">Knowledge</text>
  <text class="ts" x="568" y="386" text-anchor="middle" dominant-baseline="central">+ happiness</text>
</g>
<line x1="182" y1="375" x2="190" y2="375" class="arr" marker-end="url(#arrow)"/>
<line x1="334" y1="375" x2="342" y2="375" class="arr" marker-end="url(#arrow)"/>
<line x1="486" y1="375" x2="494" y2="375" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="40" y="424">Each order keeps the dharmas below it and adds its own. Animal and knowledge orders carry a self (jeevan).</text>

<!-- ===== TWO PROGRESSIONS ===== -->
<text class="th" x="40" y="470">Two progressions</text>
<g class="c-purple">
  <rect x="40" y="485" width="290" height="90" rx="12" stroke-width="0.5"/>
  <text class="th" x="60" y="510">Development Progression</text>
  <foreignObject x="52" y="518" width="266" height="54">
    <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:'Helvetica Neue',Arial,sans-serif;font-size:12px;font-weight:400;color:#56554F;line-height:1.35;margin:0;">Entire physicochemical nature is active toward orderliness; the atom itself is active toward constitutional completeness — a sentient self (jeevan).</div>
  </foreignObject>
</g>
<g class="c-coral">
  <rect x="350" y="485" width="290" height="90" rx="12" stroke-width="0.5"/>
  <text class="th" x="370" y="510">Awakening Progression</text>
  <foreignObject x="362" y="518" width="266" height="54">
    <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:'Helvetica Neue',Arial,sans-serif;font-size:12px;font-weight:400;color:#56554F;line-height:1.35;margin:0;">Inside an already-complete jeevan. Higher perspectives activate toward activity and conduct completeness.</div>
  </foreignObject>
</g>
<line x1="330" y1="530" x2="349" y2="530" class="arr" stroke="#993C1D" marker-end="url(#arrow)"/>
</g>
</svg>
