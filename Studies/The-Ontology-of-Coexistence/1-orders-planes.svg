<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="720" height="378" viewBox="0 0 720 378" role="img">
<title>Four ontological orders mapped to four planes with completeness transitions</title>
<desc>In Madhyasth Darshan, an order names what a unit is (cumulative dharma): material, bio, animal, and knowledge. A plane names where development has reached: physicochemical (material and bio), delusional (animal jeevan and deluded humans), deific (awakened humans), and divine (awakened with evidence). T1 constitutional completeness is irreversible; T2 activity and T3 conduct are awakening milestones within constitutionally complete jeevan in the knowledge order.</desc>
<style>
  .th       { font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 600; font-size: 14px; fill: #1A1A18; }
  .ts       { font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 400; font-size: 11px; fill: #56554F; }
  .txs      { font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 400; font-size: 10px; fill: #6B6A63; }
  .txs-dim  { font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 400; font-size: 9px;  fill: #8A8980; }
  .band     { font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 600; font-size: 11px; }
  .stagenum { font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 700; font-size: 10px; fill: #FCFBF8; }
  .frame { fill: #FCFBF8; stroke: #D8D6CD; stroke-width: 1.5; }
  .c-blue   rect { fill: #E7F0F9; stroke: #185FA5; }
  .c-teal   rect { fill: #E3F0EC; stroke: #0F6E56; }
  .c-purple rect { fill: #ECE7F6; stroke: #5B3FA0; }
  .c-sage   rect { fill: #E8F0E4; stroke: #4A7A3A; }
  .arr-purple { stroke: #5B3FA0; stroke-width: 1.5; fill: none; }
  .cross-link { stroke: #B7B5AC; stroke-width: 1.25; fill: none; stroke-dasharray: 5 4; }
  .cross-faint { stroke: #C9C6BB; stroke-width: 1; fill: none; stroke-dasharray: 4 4; }
</style>
<defs>
  <marker id="ar-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#5B3FA0" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
<rect class="frame" x="8" y="8" width="704" height="362" rx="20"/>

<text class="th" x="40" y="40">Orders - what a unit IS</text>
<text class="th" x="400" y="40">Planes - where it has REACHED</text>

<!-- LEFT: orders column -->
<g class="c-blue">
  <rect x="40" y="58" width="200" height="48" rx="8" stroke-width="0.75"/>
  <text class="band" x="56" y="78" fill="#185FA5">Material (padarth)</text>
  <text class="txs-dim" x="56" y="94">dharma: existence</text>
</g>
<g class="c-blue">
  <rect x="40" y="112" width="200" height="48" rx="8" stroke-width="0.75"/>
  <text class="band" x="56" y="132" fill="#185FA5">Bio / pranic (pran)</text>
  <text class="txs-dim" x="56" y="148">+ growth</text>
</g>
<g class="c-teal">
  <rect x="40" y="166" width="200" height="48" rx="8" stroke-width="0.75"/>
  <text class="band" x="56" y="186" fill="#0F6E56">Animal (jeev)</text>
  <text class="txs-dim" x="56" y="202">+ hope to live</text>
</g>
<g class="c-purple">
  <rect x="40" y="220" width="200" height="72" rx="8" stroke-width="0.75"/>
  <text class="band" x="56" y="240" fill="#5B3FA0">Knowledge / human (gyan)</text>
  <text class="txs-dim" x="56" y="256">+ happiness</text>
  <text class="txs-dim" x="56" y="272">one order, three plane-states</text>
</g>

<!-- RIGHT: planes column -->
<g class="c-blue">
  <rect x="400" y="58" width="292" height="102" rx="8" stroke-width="0.75"/>
  <circle cx="418" cy="76" r="8" fill="#185FA5"/><text class="stagenum" x="418" y="80" text-anchor="middle">1</text>
  <text class="band" x="434" y="80" fill="#185FA5">Physicochemical plane</text>
  <text class="txs" x="434" y="98">spans material + bio orders</text>
  <text class="txs-dim" x="434" y="114">development runs through the whole complex,</text>
  <text class="txs-dim" x="434" y="128">not one atom alone</text>
</g>
<g class="c-teal">
  <rect x="400" y="166" width="292" height="48" rx="8" stroke-width="0.75"/>
  <circle cx="418" cy="184" r="8" fill="#0F6E56"/><text class="stagenum" x="418" y="188" text-anchor="middle">2</text>
  <text class="band" x="434" y="184" fill="#0F6E56">Delusional plane</text>
  <text class="txs" x="434" y="202">animal jeevan + deluded humans</text>
</g>
<g class="c-purple">
  <rect x="400" y="220" width="292" height="48" rx="8" stroke-width="0.75"/>
  <circle cx="418" cy="238" r="8" fill="#5B3FA0"/><text class="stagenum" x="418" y="242" text-anchor="middle">3</text>
  <text class="band" x="434" y="238" fill="#5B3FA0">Deific plane</text>
  <text class="txs" x="434" y="256">awakened humans</text>
</g>
<g class="c-sage">
  <rect x="400" y="274" width="292" height="48" rx="8" stroke-width="0.75"/>
  <circle cx="418" cy="292" r="8" fill="#4A7A3A"/><text class="stagenum" x="418" y="296" text-anchor="middle">4</text>
  <text class="band" x="434" y="292" fill="#4A7A3A">Divine (complete) plane</text>
  <text class="txs" x="434" y="310">awakened with evidence (pramanikta)</text>
</g>

<!-- dashed cross-links -->
<line x1="240" y1="109" x2="398" y2="109" class="cross-link"/>
<line x1="240" y1="190" x2="398" y2="190" class="cross-link"/>
<line x1="240" y1="244" x2="398" y2="244" class="cross-link"/>
<line x1="240" y1="268" x2="398" y2="268" class="cross-faint"/>
<line x1="240" y1="298" x2="398" y2="298" class="cross-faint"/>

<!-- vertical T transitions -->
<line x1="620" y1="160" x2="620" y2="166" class="arr-purple" marker-end="url(#ar-purple)"/>
<text class="txs" x="686" y="163" text-anchor="end">T1 . constitutional (irreversible)</text>
<line x1="620" y1="214" x2="620" y2="220" class="arr-purple" marker-end="url(#ar-purple)"/>
<text class="txs" x="686" y="217" text-anchor="end">T2 . activity</text>
<line x1="620" y1="268" x2="620" y2="274" class="arr-purple" marker-end="url(#ar-purple)"/>
<text class="txs" x="686" y="271" text-anchor="end">T3 . conduct</text>

<!-- footers -->
<text class="txs-dim" x="40" y="330">dharma is cumulative - each order carries those below it</text>
<text class="txs-dim" x="40" y="346">Development: orders (matter into a self)</text>
<text class="txs-dim" x="400" y="346">Awakening: planes 2 to 4 (a self maturing, reversible)</text>
</svg>
