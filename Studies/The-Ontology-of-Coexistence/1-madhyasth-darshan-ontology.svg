<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="820" height="700" viewBox="0 0 820 700" role="img" font-family="Helvetica, Arial, sans-serif">
  <title>Madhyasth Darshan — the architecture of coexistence</title>
  <desc>Overview of Section 1: two co-eternal poles (Omnipresence/satta and units/ikai) bound by saturation; four developmental orders (material, bio, animal, knowledge); Development and Awakening progressions through transitions T1, T2, T3; with conservation and causation framing notes.</desc>
  <defs>
    <marker id="ahSteel" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5E7686"/>
    </marker>
    <marker id="ahIndigo" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6F63A8"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="410" y="30" text-anchor="middle" font-size="21" font-weight="700" fill="#1F2D3A">Madhyasth Darshan — the architecture of coexistence</text>
  <text x="410" y="53" text-anchor="middle" font-size="12.5" fill="#5A6B78">Beginningless coexistence: two co-eternal poles, neither made from the other — the world fully real.</text>

  <!-- Satta ground (pole 1): the wash that contains everything = saturation -->
  <rect x="22" y="74" width="776" height="512" rx="14" fill="#E9F0F4" stroke="#9DB4C2" stroke-width="1.5"/>
  <text x="40" y="98" font-size="12.5" font-weight="700" fill="#2F5168">OMNIPRESENCE · satta  (pole 1 — the pervasive ground)</text>
  <text x="40" y="115" font-size="10.6" fill="#46627A">formless · all-pervasive · actionless (kriya-shunya) · non-transforming · does not begin or end</text>
  <text x="40" y="130" font-size="10.6" fill="#46627A">Every unit is soaked, submerged &amp; surrounded in this ground — saturation (samprikt) is the bond, not extraction.</text>

  <!-- Units (pole 2): glyph cluster sitting in the ground, joined by relationships -->
  <text x="150" y="156" text-anchor="middle" font-size="9.6" fill="#7E97A6">saturated in satta (samprikt)</text>
  <line x1="110" y1="178" x2="150" y2="166" stroke="#8AA0AE" stroke-width="0.9"/>
  <line x1="150" y1="166" x2="192" y2="182" stroke="#8AA0AE" stroke-width="0.9"/>
  <line x1="110" y1="178" x2="134" y2="202" stroke="#8AA0AE" stroke-width="0.9"/>
  <line x1="134" y1="202" x2="174" y2="204" stroke="#8AA0AE" stroke-width="0.9"/>
  <line x1="192" y1="182" x2="174" y2="204" stroke="#8AA0AE" stroke-width="0.9"/>
  <line x1="150" y1="166" x2="210" y2="170" stroke="#8AA0AE" stroke-width="0.9"/>
  <circle cx="110" cy="178" r="7.5" fill="#FDFCF7" stroke="#5E7686" stroke-width="1"/>
  <circle cx="150" cy="166" r="7.5" fill="#FDFCF7" stroke="#5E7686" stroke-width="1"/>
  <circle cx="192" cy="182" r="7.5" fill="#FDFCF7" stroke="#5E7686" stroke-width="1"/>
  <circle cx="134" cy="202" r="7.5" fill="#FDFCF7" stroke="#5E7686" stroke-width="1"/>
  <circle cx="174" cy="204" r="7.5" fill="#FDFCF7" stroke="#5E7686" stroke-width="1"/>
  <circle cx="210" cy="170" r="7.5" fill="#FDFCF7" stroke="#5E7686" stroke-width="1"/>
  <text x="150" y="230" text-anchor="middle" font-size="9.6" font-style="italic" fill="#5A6B78">units in definite relationships (sambandh)</text>

  <!-- Units card -->
  <rect x="300" y="146" width="478" height="80" rx="8" fill="#FFFFFF" stroke="#C2CED6" stroke-width="1"/>
  <text x="316" y="168" font-size="12.5" font-weight="700" fill="#2F5168">UNITS · ikai  (pole 2 — formful nature)</text>
  <text x="316" y="187" font-size="10.6" fill="#3F4D57">Bounded, plural, real. Each carries form, properties, essential nature &amp; dharma.</text>
  <text x="316" y="203" font-size="10.6" fill="#3F4D57">Active and developing; complementary units compose into tiered assemblies</text>
  <text x="316" y="218" font-size="10.6" fill="#3F4D57">(composition is not development).</text>

  <!-- Transition callouts -->
  <text x="409" y="244" text-anchor="middle" font-size="11" font-weight="700" fill="#9C7B1F">T1 · gathanpurnata — atom becomes sentient jeevan</text>
  <text x="409" y="258" text-anchor="middle" font-size="9.6" fill="#7A6420">insentient → sentient · irreversible</text>
  <text x="691" y="244" text-anchor="middle" font-size="10.4" font-weight="700" fill="#564B94">T2 activity · T3 conduct completeness</text>
  <text x="691" y="258" text-anchor="middle" font-size="9.2" fill="#6F63A8">awakening milestones, within jeevan</text>

  <!-- T1 line (sits in the gap between bio and animal) -->
  <line x1="409" y1="266" x2="409" y2="416" stroke="#C9A227" stroke-width="2" stroke-dasharray="5 4"/>
  <circle cx="409" cy="266" r="4.5" fill="#C9A227"/>
  <!-- T2 / T3 ticks on the human panel -->
  <line x1="648" y1="280" x2="648" y2="290" stroke="#6F63A8" stroke-width="2"/>
  <line x1="726" y1="280" x2="726" y2="290" stroke="#6F63A8" stroke-width="2"/>

  <!-- The four orders -->
  <rect x="40" y="290" width="174" height="115" rx="8" fill="#DDE4E9" stroke="#9AAAB5" stroke-width="1"/>
  <text x="127" y="316" text-anchor="middle" font-size="12" font-weight="700" fill="#2B3A45">MATERIAL</text>
  <text x="127" y="332" text-anchor="middle" font-size="9.8" font-style="italic" fill="#41525D">padarth</text>
  <text x="127" y="352" text-anchor="middle" font-size="9.6" fill="#41525D">integration–disintegration</text>
  <text x="127" y="368" text-anchor="middle" font-size="9.6" fill="#41525D">dharma: existence</text>
  <text x="127" y="394" text-anchor="middle" font-size="9" font-style="italic" fill="#7A8893">insentient (jada)</text>

  <rect x="228" y="290" width="174" height="115" rx="8" fill="#D9E8DD" stroke="#93B79E" stroke-width="1"/>
  <text x="315" y="316" text-anchor="middle" font-size="12" font-weight="700" fill="#28402F">BIO / PRANIC</text>
  <text x="315" y="332" text-anchor="middle" font-size="9.8" font-style="italic" fill="#3C5443">pran</text>
  <text x="315" y="352" text-anchor="middle" font-size="9.6" fill="#3C5443">vitalising–devitalising</text>
  <text x="315" y="368" text-anchor="middle" font-size="9.6" fill="#3C5443">+ growth</text>
  <text x="315" y="394" text-anchor="middle" font-size="9" font-style="italic" fill="#7A8893">insentient (jada)</text>

  <rect x="416" y="290" width="174" height="115" rx="8" fill="#F2E7CF" stroke="#CBAE78" stroke-width="1"/>
  <text x="503" y="316" text-anchor="middle" font-size="12" font-weight="700" fill="#5C4A1E">ANIMAL</text>
  <text x="503" y="332" text-anchor="middle" font-size="9.8" font-style="italic" fill="#6A5520">jeev</text>
  <text x="503" y="352" text-anchor="middle" font-size="9.6" fill="#6A5520">cruel–uncruel</text>
  <text x="503" y="368" text-anchor="middle" font-size="9.6" fill="#6A5520">+ hope to live</text>
  <text x="503" y="394" text-anchor="middle" font-size="9" font-style="italic" fill="#9C7B1F">sentient — jeevan</text>

  <rect x="604" y="290" width="174" height="115" rx="8" fill="#E0DDF0" stroke="#A39BCB" stroke-width="1"/>
  <text x="691" y="314" text-anchor="middle" font-size="12" font-weight="700" fill="#3A3470">KNOWLEDGE /</text>
  <text x="691" y="328" text-anchor="middle" font-size="12" font-weight="700" fill="#3A3470">HUMAN</text>
  <text x="691" y="344" text-anchor="middle" font-size="9.8" font-style="italic" fill="#4A4380">gyan</text>
  <text x="691" y="360" text-anchor="middle" font-size="9.6" fill="#4A4380">fortitude, kindness, compassion …</text>
  <text x="691" y="376" text-anchor="middle" font-size="9.6" fill="#4A4380">+ happiness</text>
  <text x="691" y="394" text-anchor="middle" font-size="9" font-style="italic" fill="#564B94">sentient — jeevan</text>

  <!-- Progressions -->
  <line x1="48" y1="430" x2="404" y2="430" stroke="#5E7686" stroke-width="2.5" marker-end="url(#ahSteel)"/>
  <text x="226" y="449" text-anchor="middle" font-size="10.4" font-weight="700" fill="#3F5566">DEVELOPMENT PROGRESSION · vikas-kram</text>
  <text x="226" y="463" text-anchor="middle" font-size="9.4" fill="#52677A">physicochemical &amp; biochemical complex → constitutional completeness (T1)</text>

  <text x="503" y="449" text-anchor="middle" font-size="9" font-style="italic" fill="#8A7A4E">animal jeevan:</text>
  <text x="503" y="461" text-anchor="middle" font-size="9" font-style="italic" fill="#8A7A4E">sentient, definite conduct</text>

  <line x1="606" y1="430" x2="776" y2="430" stroke="#6F63A8" stroke-width="2.5" marker-end="url(#ahIndigo)"/>
  <text x="691" y="449" text-anchor="middle" font-size="10.4" font-weight="700" fill="#564B94">AWAKENING · jagriti-kram</text>
  <text x="691" y="463" text-anchor="middle" font-size="9.4" fill="#6A5FA0">T2 → T3 → realisation · reversible</text>

  <!-- Central caution -->
  <text x="410" y="486" text-anchor="middle" font-size="10" font-style="italic" fill="#465A6B">Development ≠ awakening   ·   composition ≠ development   ·   realisation in Omnipresence = telos of both</text>

  <!-- In-ground reading notes -->
  <line x1="40" y1="502" x2="780" y2="502" stroke="#C2CED6" stroke-width="1"/>
  <text x="40" y="524" font-size="9.6" fill="#46627A">Four real, stable plateaus of nature; dharma is cumulative (each order carries those below it).</text>
  <text x="40" y="540" font-size="9.6" fill="#46627A">Change = unit-activity — effort–motion–result (shram–gati–parinam) — oriented toward completeness.</text>
  <text x="40" y="556" font-size="9.6" fill="#46627A">Telos = coexistence evident in fulfilled relationships: fulfilment within the ground, not exit from it.</text>

  <!-- Framing boxes -->
  <rect x="22" y="600" width="379" height="86" rx="8" fill="#F4F1EA" stroke="#CBBE9B" stroke-width="1"/>
  <text x="38" y="620" font-size="11" font-weight="700" fill="#6F5A22">Beginningless &amp; conserved</text>
  <text x="38" y="638" font-size="9.6" fill="#4A4334">Nothing arises from, or vanishes into, non-being (abhava).</text>
  <text x="38" y="652" font-size="9.6" fill="#4A4334">Bodies, configurations &amp; associations begin and end;</text>
  <text x="38" y="666" font-size="9.6" fill="#4A4334">underlying vastu persists through transformation.</text>
  <text x="38" y="681" font-size="9.6" font-style="italic" fill="#4A4334">“Brahma is truth, the world is perpetual” (jagat satat).</text>

  <rect x="419" y="600" width="379" height="86" rx="8" fill="#EEF0F4" stroke="#AEBCC6" stroke-width="1"/>
  <text x="435" y="620" font-size="11" font-weight="700" fill="#33536A">Causation &amp; time</text>
  <text x="435" y="638" font-size="9.6" fill="#3F4D57">Satta is mahakaran — the sustaining ground, not the</text>
  <text x="435" y="652" font-size="9.6" fill="#3F4D57">efficient cause; units do the work of change.</text>
  <text x="435" y="666" font-size="9.6" fill="#3F4D57">Time (kaal) = duration of unit-activity,</text>
  <text x="435" y="680" font-size="9.6" fill="#3F4D57">not an independent cosmic container.</text>
</svg>
