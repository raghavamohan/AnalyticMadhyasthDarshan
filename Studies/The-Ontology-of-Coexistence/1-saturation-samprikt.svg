<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="950" height="550" viewBox="0 0 950 550" role="img">
<title>Saturation contrasted with physicalist emergence</title>
<desc>Left: physicalist emergence stacks consciousness above complex biological assembly with an explanatory gap. Right: in Madhyasth Darshan, units saturated in satta compose from particles through atoms to body; constitutional completeness actualizes sentient jeevan reflecting ever-present gyan, which works through the body as joint form.</desc>
<style>
  .th  { font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 700; font-size: 20px; fill: #37474F; }
  .sub { font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 400; font-size: 14px; fill: #546E7A; }
  .lbl { font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 700; font-size: 14px; fill: #37474F; }
  .txs { font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 400; font-size: 12px; fill: #546E7A; }
  .txs-sm { font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 400; font-size: 11px; fill: #37474F; }
  .gap { font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 700; font-size: 13px; fill: #EF5350; }
  .bond { font-family: 'Helvetica Neue', Arial, sans-serif; font-style: italic; font-size: 11px; fill: #0D47A1; }
  .cc   { font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 700; font-size: 12px; fill: #E65100; }
  .cc-i { font-family: 'Helvetica Neue', Arial, sans-serif; font-style: italic; font-size: 11px; fill: #E65100; }
  .jv   { font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 700; font-size: 14px; fill: #E65100; }
  .jv-s { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 11px; fill: #E65100; }
  .jf   { font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 700; font-size: 12px; fill: #1B5E20; }
  .th-r { font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 700; font-size: 20px; fill: #0D47A1; }
  .sub-r { font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 400; font-size: 14px; fill: #1565C0; }
</style>
<defs>
  <linearGradient id="sattaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#E3F2FD"/>
    <stop offset="50%" stop-color="#BBDEFB"/>
    <stop offset="100%" stop-color="#90CAF9"/>
  </linearGradient>
  <radialGradient id="glow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#FFC107" stop-opacity="0.8"/>
    <stop offset="60%" stop-color="#FFD54F" stop-opacity="0.4"/>
    <stop offset="100%" stop-color="#FFE082" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="pulse" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.6"/>
    <stop offset="50%" stop-color="#E3F2FD" stop-opacity="0.3"/>
    <stop offset="100%" stop-color="#90CAF9" stop-opacity="0"/>
  </radialGradient>
  <marker id="arrowLeft" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#546E7A"/>
  </marker>
  <marker id="arrowGap" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#EF5350"/>
  </marker>
  <marker id="arrowRight" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#1565C0"/>
  </marker>
  <marker id="arrowBond" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#0D47A1"/>
  </marker>
  <marker id="arrowJoint" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#E65100"/>
  </marker>
</defs>

<!-- Left: physicalist emergence -->
<rect x="25" y="40" width="425" height="490" fill="#F8F9FA" stroke="#CFD8DC" stroke-width="2" rx="10"/>
<text class="th" x="237" y="75" text-anchor="middle">Physicalist Emergence</text>
<text class="sub" x="237" y="95" text-anchor="middle">Sentience generated from complex matter</text>

<ellipse cx="237" cy="155" rx="70" ry="35" fill="#FFF8E1" stroke="#FFC107" stroke-width="2"/>
<text class="lbl" x="237" y="160" text-anchor="middle" fill="#FF8F00">Consciousness</text>

<line x1="237" y1="240" x2="237" y2="195" stroke="#EF5350" stroke-width="3" stroke-dasharray="6,4" marker-end="url(#arrowGap)"/>
<text class="gap" x="250" y="222">The Explanatory Gap</text>

<path d="M 180 310 Q 237 260 295 310 Q 320 350 237 360 Q 150 350 180 310 Z" fill="#B0BEC5" stroke="#78909C" stroke-width="2"/>
<circle cx="210" cy="320" r="8" fill="#78909C"/>
<circle cx="240" cy="305" r="8" fill="#78909C"/>
<circle cx="265" cy="330" r="8" fill="#78909C"/>
<text class="lbl" x="237" y="380" text-anchor="middle">Complex Biological Assembly</text>
<text class="txs" x="237" y="395" text-anchor="middle">(Brain / Organism)</text>

<line x1="237" y1="440" x2="237" y2="405" stroke="#546E7A" stroke-width="3" marker-end="url(#arrowLeft)"/>
<text class="txs" x="250" y="425">Assembly</text>

<circle cx="195" cy="465" r="8" fill="#78909C"/>
<circle cx="215" cy="475" r="8" fill="#78909C"/>
<circle cx="240" cy="465" r="8" fill="#78909C"/>
<circle cx="265" cy="480" r="8" fill="#78909C"/>
<circle cx="280" cy="460" r="8" fill="#78909C"/>
<text class="txs" x="237" y="505" text-anchor="middle">Unconscious Particles/Atoms</text>

<!-- Right: saturation -->
<rect x="500" y="40" width="425" height="490" fill="url(#sattaGrad)" stroke="#64B5F6" stroke-width="2" rx="10"/>
<text class="th-r" x="712" y="75" text-anchor="middle">Saturation (Samprikt)</text>
<text class="sub-r" x="712" y="95" text-anchor="middle">Sentience actualized in specific atomic structure</text>

<circle cx="712" cy="460" r="80" fill="url(#pulse)"/>

<circle cx="530" cy="455" r="5" fill="#78909C"/>
<circle cx="540" cy="445" r="5" fill="#78909C"/>
<circle cx="545" cy="465" r="5" fill="#78909C"/>
<text class="txs-sm" x="537" y="490" text-anchor="middle">Particles</text>

<line x1="565" y1="455" x2="590" y2="455" stroke="#0D47A1" stroke-width="2" marker-end="url(#arrowBond)"/>

<circle cx="615" cy="455" r="14" fill="none" stroke="#455A64" stroke-width="2"/>
<circle cx="615" cy="455" r="6" fill="#546E7A"/>
<circle cx="601" cy="455" r="3" fill="#78909C"/>
<circle cx="629" cy="455" r="3" fill="#78909C"/>
<text class="txs-sm" x="615" y="490" text-anchor="middle">Atoms</text>

<line x1="640" y1="455" x2="735" y2="455" stroke="#0D47A1" stroke-width="2" marker-end="url(#arrowBond)"/>
<text class="bond" x="690" y="445" text-anchor="middle">Composition</text>

<path d="M 745 455 Q 780 415 815 455 Q 825 480 780 485 Q 735 480 745 455 Z" fill="#B0BEC5" stroke="#78909C" stroke-width="2"/>
<circle cx="765" cy="460" r="6" fill="#78909C"/>
<circle cx="785" cy="445" r="6" fill="#78909C"/>
<circle cx="800" cy="465" r="6" fill="#78909C"/>
<text class="txs-sm" x="780" y="505" text-anchor="middle">Complex/Body</text>
<text class="txs-sm" x="780" y="520" text-anchor="middle">(Shareer)</text>

<path d="M 615 430 Q 615 180 710 180" fill="none" stroke="#E65100" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrowJoint)"/>
<text class="cc" x="625" y="320">Constitutional</text>
<text class="cc" x="625" y="335">Completeness</text>
<text class="cc-i" x="625" y="350">(Atom becomes</text>
<text class="cc-i" x="625" y="365">immortal unit)</text>

<circle cx="780" cy="180" r="70" fill="url(#glow)"/>
<circle cx="780" cy="180" r="30" fill="none" stroke="#FF8F00" stroke-width="3"/>
<circle cx="780" cy="180" r="20" fill="none" stroke="#FF8F00" stroke-width="2" stroke-dasharray="5,3"/>
<circle cx="780" cy="180" r="12" fill="#FFF8E1" stroke="#FFC107" stroke-width="4"/>
<circle cx="780" cy="180" r="5" fill="#FF8F00"/>
<circle cx="750" cy="180" r="4" fill="#FF8F00"/>
<circle cx="810" cy="180" r="4" fill="#FF8F00"/>
<circle cx="780" cy="150" r="4" fill="#FF8F00"/>
<circle cx="780" cy="210" r="4" fill="#FF8F00"/>

<text class="jv" x="780" y="270" text-anchor="middle">Sentient Atom (Jeevan)</text>
<text class="jv-s" x="780" y="285" text-anchor="middle">Reflects background Gyan</text>
<text class="jv-s" x="780" y="300" text-anchor="middle">into active sentience</text>

<line x1="780" y1="315" x2="780" y2="410" stroke="#43A047" stroke-width="3" stroke-dasharray="6,4" marker-end="url(#arrowRight)" marker-start="url(#arrowRight)"/>
<rect x="735" y="350" width="90" height="25" fill="url(#sattaGrad)" stroke="#43A047" stroke-width="1" rx="4"/>
<text class="jf" x="780" y="367" text-anchor="middle">Joint Form</text>
</svg>
