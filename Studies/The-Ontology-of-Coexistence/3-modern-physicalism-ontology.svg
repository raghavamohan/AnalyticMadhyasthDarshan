<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="740" height="676" viewBox="0 0 740 676" role="img">
<title>The structure of reality in modern physicalism</title>
<desc>Physicalism holds that every concrete phenomenon is physical. Reality is one level, built upward by composition: quantum fields and spacetime at the base, localised excitations as particles, atoms and molecules, brains and bodies, and the self as a model the brain generates. Causation is efficient mechanism under conservation laws, with no ground beyond the physical and no purpose it heads toward. Two disputes are unresolved: whether subjective experience can be reduced to physical process, and whether the universe had a beginning.</desc>

<!-- ============================================================
     EDIT COLORS, FONTS AND TEXT SIZES HERE
     Shared style block across all three tradition diagrams.
     ============================================================ -->
<style>
  .th { font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 600; font-size: 15px; fill: #1A1A18; }
  .ts { font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 400; font-size: 12px; fill: #56554F; }

  .title   { font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 700; font-size: 20px; fill: #1A1A18; }
  .caption { font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 400; font-size: 12px; font-style: italic; fill: #6B6A63; }

  .frame { fill: #FCFBF8; stroke: #D8D6CD; stroke-width: 1.5; }

  .c-gray   rect { fill: #F2F1EC; stroke: #B7B5AC; }
  .c-teal   rect { fill: #E3F0EC; stroke: #0F6E56; }
  .c-blue   rect { fill: #E7F0F9; stroke: #185FA5; }
  .c-coral  rect { fill: #F9E9E2; stroke: #993C1D; }

  .arr { stroke: #56554F; stroke-width: 1.5; fill: none; }
</style>

<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- ===== OUTER BACKGROUND FRAME ===== -->
<rect class="frame" x="8" y="8" width="724" height="660" rx="24"/>

<!-- ===== DIAGRAM CONTENT ===== -->
<g transform="translate(-10,0)">
<text class="th" x="40" y="30">One level of reality, built upward by composition</text>
<text class="ts" x="40" y="48">Every concrete phenomenon is physical. Higher levels are arrangements of lower ones — no separate ground.</text>

<!-- ===== THE STACK (base to top) ===== -->
<g class="c-blue">
  <rect x="40" y="62" width="600" height="58" rx="10" stroke-width="0.5"/>
  <text class="th" x="60" y="86">Quantum fields and spacetime</text>
  <text class="ts" x="60" y="105">The base substrate. Conserved, all-pervasive. No inherent consciousness or teleology.</text>
</g>
<line x1="340" y1="120" x2="340" y2="134" class="arr" marker-end="url(#arrow)"/>

<g class="c-blue">
  <rect x="40" y="136" width="600" height="50" rx="10" stroke-width="0.5"/>
  <text class="th" x="60" y="158">Particles</text>
  <text class="ts" x="60" y="176">Localised excitations of the fields, not tiny enduring substances.</text>
</g>
<line x1="340" y1="186" x2="340" y2="200" class="arr" marker-end="url(#arrow)"/>

<g class="c-blue">
  <rect x="40" y="202" width="600" height="50" rx="10" stroke-width="0.5"/>
  <text class="th" x="60" y="224">Atoms, molecules, matter</text>
  <text class="ts" x="60" y="242">Bound structures, governed by physical law.</text>
</g>
<line x1="340" y1="252" x2="340" y2="266" class="arr" marker-end="url(#arrow)"/>

<g class="c-blue">
  <rect x="40" y="268" width="600" height="50" rx="10" stroke-width="0.5"/>
  <text class="th" x="60" y="290">Brains and bodies</text>
  <text class="ts" x="60" y="308">Evolved organisms. Mind is what the brain does.</text>
</g>
<line x1="340" y1="318" x2="340" y2="332" class="arr" marker-end="url(#arrow)"/>

<g class="c-teal">
  <rect x="40" y="334" width="600" height="58" rx="10" stroke-width="0.5"/>
  <text class="th" x="60" y="358">The self</text>
  <text class="ts" x="60" y="377">A model the brain generates to regulate the organism. No survival past brain death.</text>
</g>

<!-- ===== CAUSATION + METHOD ===== -->
<g class="c-gray">
  <rect x="40" y="416" width="290" height="76" rx="12" stroke-width="0.5"/>
  <text class="th" x="60" y="441">Causation</text>
  <text class="ts" x="60" y="461">Efficient mechanism under conservation</text>
  <text class="ts" x="60" y="478">laws. No supreme ground, no purpose.</text>
</g>
<g class="c-gray">
  <rect x="350" y="416" width="290" height="76" rx="12" stroke-width="0.5"/>
  <text class="th" x="370" y="441">Method</text>
  <text class="ts" x="370" y="461">Observation, modelling, public</text>
  <text class="ts" x="370" y="478">evidence. Third-person confirmation.</text>
</g>

<!-- ===== TWO OPEN DISPUTES ===== -->
<text class="th" x="40" y="528">Two disputes physicalism has not settled</text>
<g class="c-coral">
  <rect x="40" y="543" width="290" height="92" rx="12" stroke-width="0.5"/>
  <text class="th" x="60" y="568">The hard problem</text>
  <text class="ts" x="60" y="588">Why is there subjective experience at</text>
  <text class="ts" x="60" y="605">all? Reductionists, panpsychists and</text>
  <text class="ts" x="60" y="622">illusionists disagree sharply.</text>
</g>
<g class="c-coral">
  <rect x="350" y="543" width="290" height="92" rx="12" stroke-width="0.5"/>
  <text class="th" x="370" y="568">A beginning?</text>
  <text class="ts" x="370" y="588">Standard cosmology dates the observable</text>
  <text class="ts" x="370" y="605">universe; whether the substrate itself</text>
  <text class="ts" x="370" y="622">began is unsettled.</text>
</g>
</g>
</svg>
